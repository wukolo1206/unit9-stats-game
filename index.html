<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>第九單元 統計表</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #0984e3 0%, #6c5ce7 100%);
            padding: 28px 20px 24px; text-align: center; color: #fff; }
    .hero-sub { font-size: 13px; letter-spacing: 2px; opacity: .75; margin-bottom: 6px; }
    .hero-title { font-size: 26px; font-weight: bold; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 12px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 18px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(74,108,247,.10);
            text-decoration: none; color: inherit;
            display: flex; flex-direction: column;
            transition: transform .15s;
            -webkit-tap-highlight-color: transparent; }
    .card:active { transform: scale(.97); }
    .card-top { height: 7px; }
    .card-body { padding: 14px 14px 16px; flex: 1; display: flex; flex-direction: column; }
    .card-icon { font-size: 30px; margin-bottom: 8px; }
    .card-title { font-size: 16px; font-weight: bold; color: #222; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: #888; line-height: 1.5; flex: 1; }
    .card-go { margin-top: 12px; font-size: 13px; font-weight: bold; }
    .seq { display: inline-block; background: #f0f4ff; color: #4a6cf7;
           font-size: 11px; font-weight: bold; border-radius: 6px;
           padding: 2px 7px; margin-bottom: 8px; letter-spacing: .5px; }
  </style>
</head>
<body>
<div class="hero">
  <div class="hero-sub">康軒三下數學 · 第九單元</div>
  <div class="hero-title">統計表</div>
</div>
<div class="wrap">
  <div class="cards">
    <a class="card" href="table1d.html">
      <div class="card-top" style="background:linear-gradient(90deg,#0984e3,#74b9ff)"></div>
      <div class="card-body">
        <div class="seq">活動一 · 觀察</div>
        <div class="card-icon">📊</div>
        <div class="card-title">讀一維表格</div>
        <div class="card-desc">點選類別，找到對應的數字。查值、填空、反推三關練習。</div>
        <div class="card-go" style="color:#0984e3">開始 →</div>
      </div>
    </a>
    <a class="card" href="table2d.html">
      <div class="card-top" style="background:linear-gradient(90deg,#e17055,#fdcb6e)"></div>
      <div class="card-body">
        <div class="seq">活動二 · 發現</div>
        <div class="card-icon">🗺️</div>
        <div class="card-title">讀二維表格</div>
        <div class="card-desc">行 × 欄 → 交叉格。統計表、時刻表、票價表三種情境練習。</div>
        <div class="card-go" style="color:#e17055">開始 →</div>
      </div>
    </a>
    <a class="card" href="make-table.html">
      <div class="card-top" style="background:linear-gradient(90deg,#6c5ce7,#a29bfe)"></div>
      <div class="card-body">
        <div class="seq">活動三 · 練習</div>
        <div class="card-icon">✏️</div>
        <div class="card-title">製作統計表</div>
        <div class="card-desc">從原始資料卡片計數，自己填入統計表，再回答應用題。</div>
        <div class="card-go" style="color:#6c5ce7">開始 →</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
