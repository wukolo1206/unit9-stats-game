<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>讀二維表格</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .hero { background: linear-gradient(135deg, #e17055, #fdcb6e);
            padding: 20px; text-align: center; color: #fff; }
    .hero-back { font-size: 13px; opacity: .8; text-decoration: none; color: #fff;
                 display: inline-block; margin-bottom: 8px; }
    .hero-title { font-size: 20px; font-weight: bold; }

    .scenario-tabs { display: flex; background: #fff; border-bottom: 2px solid #fde8e0; overflow-x: auto; }
    .scenario-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px;
                    font-weight: bold; color: #aaa; cursor: pointer; white-space: nowrap;
                    border-bottom: 3px solid transparent; transition: all .2s; min-width: 80px; }
    .scenario-tab.active { color: #e17055; border-bottom-color: #e17055; }

    .mode-wrap { display: flex; gap: 8px; padding: 12px 12px 0; max-width: 680px; margin: 0 auto; }
    .mode-btn { flex: 1; padding: 8px; border-radius: 10px; border: 2px solid #e17055;
                background: #fff; color: #e17055; font-size: 13px; font-weight: bold;
                cursor: pointer; font-family: inherit; transition: all .15s; }
    .mode-btn.active { background: #e17055; color: #fff; }

    .prog-wrap { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
                 max-width: 680px; margin: 0 auto; }
    .prog-bar { flex: 1; height: 8px; background: #e8eaf6; border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: #e17055; border-radius: 4px; transition: width .4s; }
    .prog-label { font-size: 12px; color: #888; white-space: nowrap; }

    .wrap { max-width: 680px; margin: 0 auto; padding: 8px 12px 20px; }

    .q-card { background: #fff; border-radius: 16px; padding: 16px 20px;
              box-shadow: 0 2px 12px rgba(225,112,85,.12); margin-bottom: 14px;
              font-size: 15px; font-weight: bold; color: #333; line-height: 1.6; }
    .q-hint { font-size: 12px; color: #e17055; margin-top: 6px; font-weight: normal; }

    .tbl-wrap { background: #fff; border-radius: 16px; overflow: hidden;
                box-shadow: 0 2px 12px rgba(225,112,85,.12); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #f0f0f0; }
    th { background: #fff7f5; font-weight: bold; color: #555; }
    .row-hdr { font-weight: bold; color: #444; cursor: pointer; transition: background .15s; }
    .col-hdr { cursor: pointer; transition: background .15s; }
    .data-cell { transition: all .2s; }
    .data-cell.hl-row-cell { background: #ffe8e6; }
    .data-cell.hl-col-cell { background: #dbeeff; }
    .data-cell.hl-cross {
      background: #e74c3c !important; color: white !important;
      font-weight: bold; transform: scale(1.3); border-radius: 6px;
      box-shadow: 0 2px 8px rgba(231,76,60,.4); opacity: 1 !important;
    }
    .data-cell.dim { opacity: 0.15; }
    .row-hdr.hl-row { background: #ffe3e0 !important; color: #c0392b !important; }
    .col-hdr.hl-col { background: #dbeeff !important; color: #2980b9 !important; }
    .data-cell.clickable { cursor: pointer; }
    .data-cell.clickable:hover { background: #ffeaa7; }
    .data-cell.rev-target-cell {
      background: #fdcb6e !important; font-weight: bold;
      font-size: 16px; border-radius: 4px;
    }

    .done-banner { background: #e17055; color: #fff; border-radius: 16px;
                   padding: 24px; text-align: center; margin-top: 14px; display: none; }
    .done-banner h2 { font-size: 20px; margin-bottom: 8px; }
    .done-banner p { font-size: 14px; opacity: .85; margin-bottom: 16px; }
    .next-btn { background: #fff; color: #e17055; border: none; border-radius: 10px;
                padding: 10px 28px; font-size: 15px; font-weight: bold; cursor: pointer; }

    .check-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
                     font-size: 72px; pointer-events: none; z-index: 100; opacity: 0; transition: opacity .2s; }
    .check-overlay.show { opacity: 1; }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<div class="hero">
  <a class="hero-back" href="index.html">← 返回</a>
  <div class="hero-title">🗺️ 讀二維表格</div>
</div>

<div class="scenario-tabs">
  <div class="scenario-tab active" data-sc="stats" onclick="switchScenario('stats')">統計表</div>
  <div class="scenario-tab" data-sc="schedule" onclick="switchScenario('schedule')">時刻表</div>
  <div class="scenario-tab" data-sc="fare" onclick="switchScenario('fare')">票價表</div>
</div>

<div class="mode-wrap">
  <button class="mode-btn active" id="modeBtn0" onclick="switchMode('fwd')">正查</button>
  <button class="mode-btn" id="modeBtn1" onclick="switchMode('rev')">反推</button>
</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel">0 / 3</div>
</div>

<div class="wrap">
  <div class="q-card" id="qCard">
    <div id="qText">載入中...</div>
    <div class="q-hint" id="qHint"></div>
  </div>
  <div class="tbl-wrap" id="tblWrap"></div>
  <div class="done-banner" id="doneBanner">
    <h2>🎉 完成！</h2>
    <p id="doneText"></p>
    <button class="next-btn" id="nextBtn">再練一次</button>
  </div>
</div>

<div class="check-overlay" id="checkOverlay">✅</div>

<script>
var SCENARIOS = {
  stats: {
    title: '統計表',
    rowLabels: ['三年級','四年級','五年級'],
    colLabels: ['籃球','跑步','游泳','羽球'],
    data: [[47,40,48,25],[38,55,42,30],[52,33,60,28]],
    fwdQs: [
      { r:1, c:1, text:'四年級喜歡跑步的有幾人？' },
      { r:0, c:2, text:'三年級喜歡游泳的有幾人？' },
      { r:2, c:3, text:'五年級喜歡羽球的有幾人？' }
    ],
    revQs: [
      { r:1, c:1, val:55, text:'55 人是哪個年級、哪項運動的人數？' },
      { r:2, c:0, val:52, text:'52 人是哪個年級、哪項運動的人數？' },
      { r:0, c:3, val:25, text:'25 人是哪個年級、哪項運動的人數？' }
    ]
  },
  schedule: {
    title: '時刻表',
    rowLabels: ['起點站','中途站','終點站'],
    colLabels: ['第1班','第2班','第3班','第4班'],
    data: [['7:00','8:30','10:00','13:00'],['7:25','8:55','10:25','13:25'],['7:50','9:20','10:50','13:50']],
    fwdQs: [
      { r:1, c:2, text:'第3班幾點到中途站？' },
      { r:2, c:1, text:'第2班幾點到終點站？' },
      { r:0, c:3, text:'第4班幾點從起點站出發？' }
    ],
    revQs: [
      { r:2, c:1, val:'9:20', text:'9:20 是哪一班到哪一站的時刻？' },
      { r:1, c:0, val:'7:25', text:'7:25 是哪一班到哪一站的時刻？' },
      { r:2, c:3, val:'13:50', text:'13:50 是哪一班到哪一站的時刻？' }
    ]
  },
  fare: {
    title: '票價表',
    rowLabels: ['甲站','乙站','丙站'],
    colLabels: ['甲站','乙站','丙站'],
    data: [['—',25,50],[25,'—',30],[50,30,'—']],
    fwdQs: [
      { r:0, c:2, text:'從甲站到丙站要多少元？' },
      { r:1, c:2, text:'從乙站到丙站要多少元？' },
      { r:0, c:1, text:'從甲站到乙站要多少元？' }
    ],
    revQs: [
      { r:1, c:2, val:30, text:'30 元是哪兩站之間的票價？' },
      { r:0, c:2, val:50, text:'50 元是哪兩站之間的票價？' },
      { r:0, c:1, val:25, text:'25 元是哪兩站之間的票價？' }
    ]
  }
};

var curSc = 'stats';
var curMode = 'fwd';
var qIdx = 0;
var selRow = -1;
var selCol = -1;
var revStep = 0;

function shake(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function(){ el.classList.remove('shake'); }, 400);
}

function showCheck() {
  var ov = document.getElementById('checkOverlay');
  ov.classList.add('show');
  setTimeout(function(){ ov.classList.remove('show'); }, 600);
}

function updateProgress(done, total) {
  document.getElementById('progFill').style.width = (done/total*100) + '%';
  document.getElementById('progLabel').textContent = done + ' / ' + total;
}

function switchScenario(sc) {
  curSc = sc;
  curMode = 'fwd';
  qIdx = 0;
  document.querySelectorAll('.scenario-tab').forEach(function(el){
    el.classList.toggle('active', el.dataset.sc === sc);
  });
  document.getElementById('modeBtn0').classList.add('active');
  document.getElementById('modeBtn1').classList.remove('active');
  document.getElementById('doneBanner').style.display = 'none';
  loadQ();
}

function switchMode(mode) {
  curMode = mode;
  qIdx = 0;
  document.getElementById('modeBtn0').classList.toggle('active', mode==='fwd');
  document.getElementById('modeBtn1').classList.toggle('active', mode==='rev');
  document.getElementById('doneBanner').style.display = 'none';
  loadQ();
}

function loadQ() {
  selRow = -1; selCol = -1; revStep = 0;
  var sc = SCENARIOS[curSc];
  var qs = curMode === 'fwd' ? sc.fwdQs : sc.revQs;
  var q = qs[qIdx];
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qHint').textContent = curMode === 'fwd'
    ? '先點左側的標題，再點上方的標題，找到交叉格。'
    : '先點左側，找出正確的行。';
  updateProgress(qIdx, qs.length);
  buildTable2d();
  if (curMode === 'rev') {
    var cell = document.getElementById('cell2d-'+q.r+'-'+q.c);
    if (cell) cell.classList.add('rev-target-cell');
  }
}

function buildTable2d() {
  var sc = SCENARIOS[curSc];
  var rows = sc.rowLabels;
  var cols = sc.colLabels;
  var data = sc.data;
  var html = '<table><thead><tr><th>　</th>';
  for (var c = 0; c < cols.length; c++) {
    html += '<th class="col-hdr" data-col="'+c+'" onclick="onColHdr('+c+')">'+cols[c]+'</th>';
  }
  html += '</tr></thead><tbody>';
  for (var r = 0; r < rows.length; r++) {
    html += '<tr><td class="row-hdr" data-row="'+r+'" onclick="onRowHdr('+r+')">'+rows[r]+'</td>';
    for (var cc = 0; cc < cols.length; cc++) {
      var clickHandler = curMode === 'fwd' ? ' onclick="onDataCell('+r+','+cc+')"' : '';
      var cls = 'data-cell' + (curMode === 'fwd' ? ' clickable' : '');
      html += '<td class="'+cls+'" id="cell2d-'+r+'-'+cc+'"'+clickHandler+'>'+data[r][cc]+'</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tblWrap').innerHTML = html;
}

function onRowHdr(r) {
  if (curMode === 'fwd') {
    selRow = r;
    applyHL();
  } else {
    if (revStep !== 0) return;
    var q = SCENARIOS[curSc].revQs[qIdx];
    if (r === q.r) {
      selRow = r;
      revStep = 1;
      document.querySelectorAll('.row-hdr').forEach(function(el){
        el.classList.toggle('hl-row', parseInt(el.dataset.row)===r);
      });
      document.getElementById('qHint').textContent = '對！再點上方找出正確的欄。';
    } else {
      shake(document.querySelectorAll('.row-hdr')[r]);
      document.getElementById('qHint').textContent = '再想想，這個值是在哪一行？';
    }
  }
}

function onColHdr(c) {
  if (curMode === 'fwd') {
    selCol = c;
    applyHL();
  } else {
    if (revStep !== 1) return;
    var q = SCENARIOS[curSc].revQs[qIdx];
    if (c === q.c) {
      var colEls = document.querySelectorAll('.col-hdr');
      if (colEls[c]) colEls[c].classList.add('hl-col');
      var cross = document.getElementById('cell2d-'+q.r+'-'+q.c);
      if (cross) { cross.classList.remove('rev-target-cell'); cross.classList.add('hl-cross'); }
      showCheck();
      updateProgress(qIdx + 1, SCENARIOS[curSc].revQs.length);
      if (qIdx + 1 >= SCENARIOS[curSc].revQs.length) {
        setTimeout(showDone, 700);
      } else {
        qIdx++;
        setTimeout(loadQ, 700);
      }
    } else {
      var colEls2 = document.querySelectorAll('.col-hdr');
      if (colEls2[c]) shake(colEls2[c]);
      document.getElementById('qHint').textContent = '再想想，這個值是在哪一欄？';
    }
  }
}

function applyHL() {
  document.querySelectorAll('.row-hdr').forEach(function(el){
    var rr = parseInt(el.dataset.row);
    el.className = 'row-hdr' + (rr===selRow ? ' hl-row' : '');
  });
  document.querySelectorAll('.col-hdr').forEach(function(el){
    var cc = parseInt(el.dataset.col);
    el.className = 'col-hdr' + (cc===selCol ? ' hl-col' : '');
  });
  document.querySelectorAll('.data-cell').forEach(function(el){
    var parts = el.id.split('-');
    var rr = parseInt(parts[1]);
    var cc = parseInt(parts[2]);
    el.className = 'data-cell clickable';
    if (rr===selRow && cc===selCol && selRow>=0 && selCol>=0) {
      el.classList.add('hl-cross');
    } else if (rr===selRow && selRow>=0) {
      el.classList.add('hl-row-cell');
      if (selCol>=0) el.classList.add('dim');
    } else if (cc===selCol && selCol>=0) {
      el.classList.add('hl-col-cell');
      if (selRow>=0) el.classList.add('dim');
    } else if (selRow>=0 || selCol>=0) {
      el.classList.add('dim');
    }
  });
}

function onDataCell(r, c) {
  if (curMode !== 'fwd') return;
  var q = SCENARIOS[curSc].fwdQs[qIdx];
  if (r === q.r && c === q.c && selRow === q.r && selCol === q.c) {
    showCheck();
    updateProgress(qIdx + 1, SCENARIOS[curSc].fwdQs.length);
    if (qIdx + 1 >= SCENARIOS[curSc].fwdQs.length) {
      setTimeout(showDone, 700);
    } else {
      qIdx++;
      setTimeout(loadQ, 700);
    }
  } else {
    var el = document.getElementById('cell2d-'+r+'-'+c);
    shake(el);
    if (selRow < 0) document.getElementById('qHint').textContent = '先點左側的行標題！';
    else if (selCol < 0) document.getElementById('qHint').textContent = '再點上方的欄標題！';
    else document.getElementById('qHint').textContent = '再確認一下行和欄是否正確？';
  }
}

function showDone() {
  document.getElementById('doneBanner').style.display = 'block';
  document.getElementById('doneText').textContent =
    SCENARIOS[curSc].title + '的' + (curMode==='fwd' ? '正查' : '反推') + '練習完成！';
  document.getElementById('nextBtn').onclick = function(){
    qIdx = 0;
    document.getElementById('doneBanner').style.display = 'none';
    loadQ();
  };
}

switchScenario('stats');
</script>
</body>
</html>
