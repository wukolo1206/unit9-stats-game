<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>讀一維表格</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }

    .hero { background: linear-gradient(135deg, #0984e3, #74b9ff);
            padding: 20px; text-align: center; color: #fff; }
    .hero-back { font-size: 13px; opacity: .8; text-decoration: none; color: #fff;
                 display: inline-block; margin-bottom: 8px; }
    .hero-title { font-size: 20px; font-weight: bold; }

    .prog-wrap { background: #fff; padding: 10px 16px; display: flex;
                 align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
    .prog-bar { flex: 1; height: 8px; background: #e8eaf6; border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: #0984e3; border-radius: 4px; transition: width .4s; }
    .prog-label { font-size: 12px; color: #888; white-space: nowrap; }

    .stage-tabs { display: flex; background: #fff; border-bottom: 2px solid #e0e7ff; }
    .stage-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: bold;
                 color: #aaa; cursor: default; }
    .stage-tab.active { color: #0984e3; border-bottom: 2px solid #0984e3; margin-bottom: -2px; }

    .wrap { max-width: 480px; margin: 0 auto; padding: 16px 12px; }

    .q-card { background: #fff; border-radius: 16px; padding: 16px 20px;
              box-shadow: 0 2px 12px rgba(74,108,247,.10); margin-bottom: 10px;
              font-size: 15px; font-weight: bold; color: #333; line-height: 1.6; }
    .q-hint { font-size: 12px; color: #0984e3; margin-top: 6px; font-weight: normal; }

    .tbl-title { text-align: center; font-size: 12px; color: #777; font-weight: bold;
                 margin-bottom: 6px; }

    .tbl-wrap { background: #fff; border-radius: 16px; overflow: hidden;
                box-shadow: 0 2px 12px rgba(74,108,247,.10); margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 15px; }
    th, td { padding: 13px 16px; border-bottom: 1px solid #f0f0f0; text-align: center; }
    th { background: #f8f9ff; font-weight: bold; color: #555; }
    th:first-child { text-align: left; padding-left: 24px; }

    .row-lbl { text-align: left; padding-left: 24px; font-weight: bold; color: #444;
               cursor: pointer; transition: background .15s, color .15s; }
    .row-lbl:hover { background: #f0f7ff; }
    .row-lbl.selected { background: #0984e3; color: #fff; }

    .val-cell { font-size: 15px; transition: all .2s; min-width: 60px; }
    .val-cell.hl-val { background: #fdcb6e; font-weight: bold; font-size: 18px;
                       border-radius: 6px; }
    .val-cell.hl-correct { background: #00b894; color: #fff; font-weight: bold;
                           border-radius: 6px; }

    .total-row td { background: #f0f4ff; font-weight: bold; color: #0984e3; }
    .total-row .row-lbl { cursor: default; color: #0984e3; }
    .total-row .row-lbl:hover { background: #f0f4ff; }

    .blank-cell { background: #ffeaa7; cursor: pointer; font-weight: bold; color: #999; }
    .blank-cell:hover { background: #ffd93d; }

    .done-banner { background: #00b894; color: #fff; border-radius: 16px;
                   padding: 24px; text-align: center; display: none; }
    .done-banner h2 { font-size: 22px; margin-bottom: 8px; }
    .done-banner p { font-size: 14px; opacity: .85; margin-bottom: 16px; }
    .next-btn { background: #fff; color: #00b894; border: none; border-radius: 10px;
                padding: 10px 28px; font-size: 15px; font-weight: bold; cursor: pointer; }

    .check-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
                     font-size: 72px; pointer-events: none; z-index: 100;
                     opacity: 0; transition: opacity .2s; }
    .check-overlay.show { opacity: 1; }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<div class="hero">
  <a class="hero-back" href="index.html">← 返回</a>
  <div class="hero-title">📊 讀一維表格</div>
</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel">0 / 4</div>
</div>

<div class="stage-tabs">
  <div class="stage-tab active" id="tab1">關卡一：查值</div>
  <div class="stage-tab" id="tab2">關卡二：填空</div>
  <div class="stage-tab" id="tab3">關卡三：反推</div>
</div>

<div class="wrap">
  <div class="q-card" id="qCard">
    <div id="qText">載入中...</div>
    <div class="q-hint" id="qHint"></div>
  </div>
  <div class="tbl-title" id="tblTitle"></div>
  <div class="tbl-wrap" id="tblWrap"></div>
  <div class="done-banner" id="doneBanner">
    <h2>🎉 關卡完成！</h2>
    <p id="doneText"></p>
    <button class="next-btn" id="nextBtn">下一關 →</button>
  </div>
</div>

<div class="check-overlay" id="checkOverlay">✅</div>

<script>
var TABLES = [
  {
    title: '三甲班最喜歡的運動統計表',
    colLabel: '運動項目',
    rows: ['籃球', '跑步', '游泳', '羽球'],
    vals: [12, 8, 15, 5],
    total: 40
  },
  {
    title: '三年級最喜歡的水果統計表',
    colLabel: '水果種類',
    rows: ['蘋果', '香蕉', '芒果', '葡萄'],
    vals: [18, 11, 9, 12],
    total: 50
  },
  {
    title: '三甲班家中飼養寵物統計表',
    colLabel: '寵物種類',
    rows: ['狗', '貓', '魚', '其他'],
    vals: [10, 7, 6, 3],
    total: 26
  }
];

var Q1 = [
  { t: 0, r: 1, text: '三甲班喜歡跑步的有幾人？' },
  { t: 0, r: 2, text: '三甲班喜歡游泳的有幾人？' },
  { t: 1, r: 0, text: '三年級最喜歡蘋果的有幾人？' },
  { t: 1, r: 3, text: '三年級最喜歡葡萄的有幾人？' }
];

var BLANKS = [
  { t: 0, r: 0,  ans: 12, opts: [9, 12, 15],   q: '三甲班喜歡籃球的有幾人？' },
  { t: 0, r: 3,  ans: 5,  opts: [3, 5, 8],     q: '三甲班喜歡羽球的有幾人？' },
  { t: 0, r: -1, ans: 40, opts: [38, 40, 42],  q: '把四項運動的人數加起來，合計是多少？' },
  { t: 1, r: 1,  ans: 11, opts: [9, 11, 13],   q: '三年級最喜歡香蕉的有幾人？' },
  { t: 2, r: 2,  ans: 6,  opts: [5, 6, 8],     q: '三甲班家中飼養魚的有幾人？' },
  { t: 2, r: -1, ans: 26, opts: [24, 26, 28],  q: '把四種寵物的人數加起來，合計是多少？' }
];

var Q3 = [
  { t: 0, r: 1, text: '表格中「8」這個數字，代表哪一項運動的人數？' },
  { t: 0, r: 2, text: '表格中「15」這個數字，代表哪一項運動的人數？' },
  { t: 2, r: 1, text: '表格中「7」這個數字，代表哪一種寵物的人數？' }
];

var stage = 1;
var q1Idx = 0;
var blankIdx = 0;
var q3Idx = 0;
var optionsEl = null;

function shake(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function() { el.classList.remove('shake'); }, 400);
}

function showCheck() {
  var ov = document.getElementById('checkOverlay');
  ov.classList.add('show');
  setTimeout(function() { ov.classList.remove('show'); }, 600);
}

function updateProgress(done, total) {
  document.getElementById('progFill').style.width = (done / total * 100) + '%';
  document.getElementById('progLabel').textContent = done + ' / ' + total;
}

function buildTable(tIdx, blanks, hlValRow) {
  blanks = blanks || [];
  hlValRow = (hlValRow !== undefined) ? hlValRow : -99;
  var tbl = TABLES[tIdx];
  document.getElementById('tblTitle').textContent = tbl.title;

  var html = '<table><thead><tr>';
  html += '<th>' + tbl.colLabel + '</th>';
  html += '<th>人數</th>';
  html += '</tr></thead><tbody>';

  for (var r = 0; r < tbl.rows.length; r++) {
    var isBlank = blanks.some(function(b) { return b.r === r; });
    var isHlVal = (hlValRow === r);
    html += '<tr>';
    html += '<td class="row-lbl" id="lbl-' + r + '" onclick="onLabelClick(' + r + ')">';
    html += tbl.rows[r] + '</td>';
    if (isBlank) {
      html += '<td class="val-cell blank-cell" id="val-' + r + '" onclick="onBlankClick(' + r + ')">？</td>';
    } else {
      html += '<td class="val-cell' + (isHlVal ? ' hl-val' : '') + '" id="val-' + r + '">';
      html += tbl.vals[r] + '</td>';
    }
    html += '</tr>';
  }

  var isTotalBlank = blanks.some(function(b) { return b.r === -1; });
  html += '<tr class="total-row">';
  html += '<td class="row-lbl">合計</td>';
  if (isTotalBlank) {
    html += '<td class="val-cell blank-cell" id="val-total" onclick="onBlankClick(-1)">？</td>';
  } else {
    html += '<td class="val-cell">' + tbl.total + '</td>';
  }
  html += '</tr>';

  html += '</tbody></table>';
  document.getElementById('tblWrap').innerHTML = html;
}

// ─── Stage 1：查值 ───
function loadQ1(idx) {
  q1Idx = idx;
  var q = Q1[idx];
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qHint').textContent = '找到對應的那一行，點一下。';
  buildTable(q.t, [], -99);
  updateProgress(idx, 4);
  document.getElementById('doneBanner').style.display = 'none';
}

function onLabelClick(r) {
  if (stage === 1) {
    var q = Q1[q1Idx];
    if (r === q.r) {
      var lbl = document.getElementById('lbl-' + r);
      var val = document.getElementById('val-' + r);
      lbl.classList.add('selected');
      if (val) val.classList.add('hl-correct');
      showCheck();
      updateProgress(q1Idx + 1, 4);
      if (q1Idx + 1 >= 4) {
        setTimeout(showStage1Done, 800);
      } else {
        setTimeout(function() { loadQ1(q1Idx + 1); }, 800);
      }
    } else {
      shake(document.getElementById('lbl-' + r));
      document.getElementById('qHint').textContent = '再想想，題目問的是哪一項？';
    }
    return;
  }

  if (stage === 3) {
    var q3 = Q3[q3Idx];
    if (r === q3.r) {
      var lbl3 = document.getElementById('lbl-' + r);
      var val3 = document.getElementById('val-' + r);
      if (lbl3) lbl3.classList.add('selected');
      if (val3) val3.classList.add('hl-correct');
      showCheck();
      updateProgress(q3Idx + 1, 3);
      if (q3Idx + 1 >= 3) {
        setTimeout(showStage3Done, 800);
      } else {
        q3Idx++;
        setTimeout(function() { loadQ3(q3Idx); }, 800);
      }
    } else {
      shake(document.getElementById('lbl-' + r));
      document.getElementById('qHint').textContent = '再想想，橘色的數字是哪一行的？';
    }
  }
}

function showStage1Done() {
  document.getElementById('doneBanner').style.display = 'block';
  document.getElementById('doneBanner').style.background = '#0984e3';
  document.getElementById('doneText').textContent = '查值練習完成！繼續到關卡二：填空。';
  document.getElementById('nextBtn').textContent = '下一關 →';
  document.getElementById('nextBtn').onclick = function() { startStage2(); };
}

// ─── Stage 2：填空 ───
function startStage2() {
  stage = 2;
  blankIdx = 0;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('tab1').classList.remove('active');
  document.getElementById('tab2').classList.add('active');
  updateProgress(0, 6);
  loadBlank(0);
}

function loadBlank(idx) {
  blankIdx = idx;
  if (optionsEl) { optionsEl.remove(); optionsEl = null; }
  var b = BLANKS[idx];
  var curT = b.t;

  buildTable(curT, [{ r: b.r }], -99);

  for (var j = 0; j < idx; j++) {
    var prev = BLANKS[j];
    if (prev.t !== curT) continue;
    var elId = (prev.r === -1) ? 'val-total' : 'val-' + prev.r;
    var el = document.getElementById(elId);
    if (el) {
      el.textContent = prev.ans;
      el.style.background = '#d4edda';
      el.style.border = '';
      el.className = 'val-cell';
    }
  }

  document.getElementById('qText').textContent = b.q;
  document.getElementById('qHint').textContent = '點一下「？」查看選項。';
  updateProgress(idx, 6);

  var curId = (b.r === -1) ? 'val-total' : 'val-' + b.r;
  var cur = document.getElementById(curId);
  if (cur) cur.style.border = '2px solid #fdcb6e';
}

function onBlankClick(r) {
  if (stage !== 2) return;
  var b = BLANKS[blankIdx];
  if (r !== b.r) return;
  showOptions(r, b.opts, b.ans);
}

function showOptions(r, opts, ans) {
  if (optionsEl) optionsEl.remove();
  var wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;';
  opts.forEach(function(v) {
    var btn = document.createElement('button');
    btn.textContent = v;
    btn.style.cssText = 'padding:10px 20px;border-radius:10px;border:2px solid #0984e3;background:#fff;font-size:15px;font-weight:bold;color:#0984e3;cursor:pointer;font-family:inherit;';
    btn.onclick = function() { selectOption(r, v, ans, btn, wrap); };
    wrap.appendChild(btn);
  });
  optionsEl = wrap;
  document.getElementById('tblWrap').insertAdjacentElement('afterend', wrap);
}

function selectOption(r, val, ans, btn, wrap) {
  if (val === ans) {
    var cellId = (r === -1) ? 'val-total' : 'val-' + r;
    var cell = document.getElementById(cellId);
    if (cell) {
      cell.textContent = val;
      cell.style.background = '#d4edda';
      cell.style.border = '';
      cell.className = 'val-cell';
    }
    wrap.remove();
    optionsEl = null;
    showCheck();
    updateProgress(blankIdx + 1, 6);
    if (blankIdx + 1 >= 6) {
      setTimeout(showStage2Done, 800);
    } else {
      setTimeout(function() { loadBlank(blankIdx + 1); }, 800);
    }
  } else {
    shake(btn);
  }
}

function showStage2Done() {
  if (optionsEl) { optionsEl.remove(); optionsEl = null; }
  document.getElementById('doneBanner').style.display = 'block';
  document.getElementById('doneBanner').style.background = '#e17055';
  document.getElementById('doneText').textContent = '填空完成！最後一關：反推練習。';
  document.getElementById('nextBtn').textContent = '下一關 →';
  document.getElementById('nextBtn').onclick = function() { startStage3(); };
}

// ─── Stage 3：反推 ───
function startStage3() {
  stage = 3;
  q3Idx = 0;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('tab2').classList.remove('active');
  document.getElementById('tab3').classList.add('active');
  updateProgress(0, 3);
  loadQ3(0);
}

function loadQ3(idx) {
  q3Idx = idx;
  var q = Q3[idx];
  buildTable(q.t, [], q.r);
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qHint').textContent = '點左側對應的項目名稱。';
  updateProgress(idx, 3);
}

function showStage3Done() {
  document.getElementById('doneBanner').style.display = 'block';
  document.getElementById('doneBanner').style.background = '#00b894';
  document.getElementById('doneText').textContent = '三關全部完成！你已經掌握一維表格的讀法了！';
  document.getElementById('nextBtn').textContent = '返回首頁';
  document.getElementById('nextBtn').onclick = function() { window.location.href = 'index.html'; };
}

// ─── Init ───
loadQ1(0);
</script>
</body>
</html>
